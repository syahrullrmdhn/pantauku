[program:pantauku-queue]
process_name=%(program_name)s_%(process_num)02d
command=php /home/syahrul/pantauku/artisan queue:work --sleep=3 --tries=3 --max-time=3600
autostart=true
autorestart=true
stopasgroup=true
killasgroup=true
user=www-data
numprocs=2
redirect_stderr=true
stdout_logfile=/home/syahrul/pantauku/storage/logs/queue-worker.log
stopwaitsecs=3600
